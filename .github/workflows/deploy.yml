name: Deploy

on:
  push:
    branches:
      - main
      - hacs-integration
      - systemd-service

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code on pi02-reader
        run: |
          ssh -o StrictHostKeyChecking=no david@pi02-reader \
            'cd ~/pi-dumb2smart-ir && git pull && sudo ./update.sh'

      - name: Update HA integration on pi5
        run: |
          cd ~/pi-dumb2smart-ir && git pull
          sudo cp -r custom_components/ir_remote ~/home-assistant/config/custom_components/
          mosquitto_pub -h 192.168.1.254 -t "ir_remote/system/restart_needed" -m "1" || true
