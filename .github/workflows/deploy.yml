name: Deploy
# Runs on every push to main: updates pi02-reader via SSH and pulls the latest code on the runner (pi5).

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - name: Pull latest code on pi02-reader
        run: |
          ssh -o StrictHostKeyChecking=accept-new david@pi02-reader \
            'cd ~/pi-dumb2smart-ir-bridge && git pull && sudo ./update.sh'

      - name: Pull latest code on pi5
        run: |
          cd ~/pi-dumb2smart-ir-bridge && git pull
