name: Deploy
# Runs on every push to main: updates all pi02 devices using ansible and pulls the latest code on the runner (pi5).

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - name: Pull latest code on pi5
        run: |
          cd ~/home-assistant/pi-dumb2smart-ir-bridge && git pull

      - name: Update IR bridge on all pi02 devices
        run: |
          ansible-playbook ~/ansible/playbooks/update_pi02_ir-bridge.yml -i ~/ansible/playbooks/pi02_hosts
